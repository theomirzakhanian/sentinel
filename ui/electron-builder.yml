appId: ai.anthropic.sentinel
productName: Sentinel
directories:
  buildResources: resources
  output: dist
files:
  - "out/**/*"
  - "package.json"
asar: true
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
